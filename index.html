<!DOCTYPE html>

        * { box-sizing: border-box; font-family: 'Arial Black', sans-serif; }
        body, html { margin: 0; padding: 0; height: 100vh; background: var(--bg); color: #fff; overflow: hidden; }

        #studio-bg { position: fixed; inset: 0; background: radial-gradient(circle at 50% 50%, #110022 0%, #000 100%); z-index: -2; }
        .grid-bg { position: absolute; inset: 0; background-image: linear-gradient(rgba(0, 255, 200, 0.1) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 255, 200, 0.1) 1px, transparent 1px); background-size: 50px 50px; opacity: 0.2; transform: rotateX(60deg) translateY(-100px); }

        /* MENU INIZIALE */
        #menu { position: fixed; inset: 0; background: rgba(0,0,0,0.98); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; backdrop-filter: blur(20px); }
        .setup-section { background: rgba(255,255,255,0.05); border-radius: 20px; padding: 20px; width: 95%; max-width: 1100px; border: 2px solid var(--cyan); }
        .p-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-top: 15px; }
        input[type="text"], .gm-input { padding: 10px; background: #000; border: 2px solid #444; color: #fff; border-radius: 8px; width: 100%; text-transform: uppercase; outline: none; }

        /* HUD GIOCATORI */
        #hud-top { display: flex; justify-content: center; flex-wrap: wrap; gap: 8px; padding: 10px; width: 100%; background: rgba(0,0,0,0.6); border-bottom: 2px solid #333; z-index: 100; }
        .p-card { background: #111; padding: 8px 12px; border-radius: 10px; text-align: center; border: 2px solid #333; min-width: 110px; transition: 0.4s; position: relative; }
        .p-card.active { border-color: var(--p); box-shadow: 0 0 15px var(--p); transform: scale(1.05); background: #001a14; }
        .p-bank { color: var(--g); font-size: 1.2rem; }

        /* AREA TABELLONE */
        #game-ui { display: none; flex-direction: column; align-items: center; height: 100vh; width: 100%; }
        #cat-display { background: var(--s); color: #fff; padding: 8px 50px; border-radius: 50px; font-size: 1.3rem; letter-spacing: 3px; margin: 15px 0; box-shadow: 0 0 15px var(--s); text-transform: uppercase; border: 3px solid #fff; z-index: 5; }
        
        .board { background: #004422; border: 10px solid #222; padding: 15px; border-radius: 15px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); z-index: 5; max-width: 98vw; }
        .row { display: flex; justify-content: center; gap: 5px; margin-bottom: 6px; }
        .tile { width: 42px; height: 60px; perspective: 1000px; }
        .tile-in { width: 100%; height: 100%; transition: 0.6s transform cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d; position: relative; }
        .tile.flipped .tile-in { transform: rotateY(180deg); }
        .face { position: absolute; inset: 0; backface-visibility: hidden; display: flex; align-items: center; justify-content: center; font-size: 28px; border-radius: 4px; }
        .face-front { background: #006633; border: 1px solid #004422; }
        .face-front.active { background: #fff; }
        .face-back { background: #fff; color: #000; transform: rotateY(180deg); border: 2px solid #000; }

        /* RUOTA */
        #wheel-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.92); display: flex; align-items: center; justify-content: center; z-index: 5000; visibility: hidden; opacity: 0; transition: 0.5s; }
        #wheel-overlay.open { visibility: visible; opacity: 1; }
        #wheel-container { position: relative; width: 500px; height: 500px; }
        #canvas-wheel { width: 100%; height: 100%; transition: transform 5s cubic-bezier(0.1, 0, 0, 1); }
        #pointer { position: absolute; top: -20px; left: 50%; transform: translateX(-50%); width: 40px; height: 60px; background: var(--red); clip-path: polygon(0% 0%, 100% 0%, 50% 100%); z-index: 5001; border: 3px solid #fff; }
        #wheel-val { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #000; color: var(--g); border-radius: 50%; width: 120px; height: 120px; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; border: 5px solid var(--g); z-index: 5002; }

        /* CONTROLLI */
        #action-bar { position: fixed; bottom: 0; width: 100%; background: rgba(0,0,0,0.95); padding: 15px; display: flex; justify-content: center; gap: 15px; border-top: 4px solid var(--p); z-index: 1000; }
        .btn { padding: 10px 25px; border: none; border-radius: 50px; cursor: pointer; text-transform: uppercase; font-weight: bold; transition: 0.2s; }
        .btn-gira { background: var(--gold); color: #000; }

        /* INPUT BAR IN BASSO */
        #input-bar { 
            position: fixed; bottom: 85px; left: 50%; transform: translateX(-50%);
            width: auto; min-width: 450px; background: rgba(0, 20, 40, 0.95); 
            backdrop-filter: blur(10px); display: none; flex-direction: column; 
            align-items: center; padding: 15px 30px; border-radius: 20px 20px 0 0;
            border: 2px solid var(--p); border-bottom: none; z-index: 9000; 
        }
        #cur-input { 
            background: #000; border: none; border-bottom: 4px solid var(--p); 
            color: #fff; font-size: 2rem; text-align: center; width: 100%; 
            outline: none; text-transform: uppercase; margin-top: 10px;
        }

        /* PANNELLO REGIA */
        #gm-panel { position: fixed; top: 0; right: -400px; width: 400px; height: 100%; background: #0a0a0a; transition: 0.4s; padding: 60px 20px; z-index: 8000; border-left: 3px solid var(--p); overflow-y: auto; }
        #gm-panel.open { right: 0; }
        .gm-section { background: #1a1a1a; padding: 15px; border-radius: 10px; margin-bottom: 15px; border: 1px solid #333; }
        .gm-player-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }

        #status-msg { position: fixed; top: 35%; left: 50%; transform: translate(-50%, -50%); font-size: 3.5rem; color: #fff; text-shadow: 0 0 20px var(--p); z-index: 2000; pointer-events: none; opacity: 0; transition: 0.5s; text-align: center; width: 100%; }
        .top-btn { position: fixed; top: 10px; z-index: 8001; background: rgba(0,0,0,0.8); border: 1px solid var(--p); color: var(--p); padding: 10px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>

        function toggleRegia() { 
            document.getElementById('gm-panel').classList.toggle('open');
            if(document.getElementById('gm-panel').classList.contains('open')) updateMasterPlayerList();
        }

        function startGame() {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            const inps = document.querySelectorAll('#p-inputs input');
            players = [];
            inps.forEach(i => { if(i.value.trim()) players.push({name: i.value.toUpperCase(), bank: 0, jolly: 0}); });
            if(players.length < 2) return alert("Minimo 2 giocatori!");
            document.getElementById('menu').style.display = 'none';
            document.getElementById('game-ui').style.display = 'flex';
            document.getElementById('gm-wheel-data').value = SPOTS.join(', ');
            drawWheel(); newRound();
        }

        function drawWheel() {
            const canvas = document.getElementById('canvas-wheel'); const ctx = canvas.getContext('2d');
            const arc = (Math.PI*2)/24; ctx.clearRect(0,0,600,600);
            for(let i=0; i<24; i++) {
                ctx.save(); ctx.translate(300,300); ctx.rotate(i*arc);
                ctx.beginPath(); ctx.moveTo(0,0); ctx.arc(0,0,290,0,arc);
                ctx.fillStyle = COLORS[i % COLORS.length]; ctx.fill(); ctx.stroke();
                ctx.rotate(arc/2); ctx.textAlign="right"; ctx.fillStyle="#fff"; ctx.font="bold 16px Arial";
                ctx.fillText(SPOTS[i], 270, 8); ctx.restore();
            }
        }

        function spinWheel() {
            if(!canSpin) return; canSpin = false;
            document.getElementById('wheel-overlay').classList.add('open');
            setTimeout(() => {
                const extra = Math.floor(Math.random() * 360) + 2160;
                currentRot += extra;
                document.getElementById('canvas-wheel').style.transform = `rotate(${currentRot}deg)`;
                let ticks = 0;
                const tInt = setInterval(() => { if(ticks++ < 25) sfx(1200, 'square', 0.03, 0.02); else clearInterval(tInt); }, 180);
                setTimeout(() => {
                    const idx = Math.floor(((360 - (currentRot % 360) + 270) % 360) / 15) % 24;
                    wheelVal = SPOTS[idx];
                    document.getElementById('wheel-val').innerText = wheelVal;
                    handleResult();
                }, 5200);
            }, 500);
        }

        function handleResult() {
            setTimeout(() => {
                document.getElementById('wheel-overlay').classList.remove('open');
                if(wheelVal === "BANK" || wheelVal === "BANCAROTTA") {
                    players[curP].bank = 0; nextTurn("BANCAROTTA!");
                } else if(wheelVal === "PASS" || wheelVal === "PASSA") {
                    nextTurn("PASSA TURNO");
                } else if(wheelVal === "x2") {
                    players[curP].bank *= 2; msg("RADDOPPIO!"); updateUI(); canSpin = true;
                } else if(wheelVal === "JOLLY") {
                    players[curP].jolly++; msg("JOLLY!"); updateUI(); canSpin = true;
                } else {
                    showInput('letter');
                }
            }, 1200);
        }

        function showInput(m) {
            if(m === 'vowel' && players[curP].bank < 250) return msg("SOLDI INSUFFICIENTI!");
            mode = m; document.getElementById('input-bar').style.display = 'flex';
            document.getElementById('input-prompt').innerText = m === 'solve' ? "RISOLVI LA FRASE" : (m === 'vowel' ? "VOCALE (-€250)" : `LETTERA DA €${wheelVal}`);
            const inp = document.getElementById('cur-input'); inp.value = ''; inp.focus();
        }

        document.getElementById('cur-input').addEventListener('keyup', (e) => {
            if(e.key === 'Enter') {
                const val = e.target.value.toUpperCase().trim();
                document.getElementById('input-bar').style.display = 'none';
                processGuess(val);
            }
        });

        async function processGuess(v) {
            if(!v) { canSpin = true; return; }
            if(mode === 'solve') {
                if(v.replace(/\s/g,'') === phrase.f.replace(/\s/g,'')) {
                    await revealAllSequential(); msg("VITTORIA!");
                    setTimeout(() => { alert("ROUND VINTO!"); newRound(); }, 2000);
                } else { nextTurn("ERRORE!"); }
            } else {
                const matches = Array.from(document.querySelectorAll(`.tile[data-char="${v}"]:not(.flipped)`));
                if(matches.length > 0) {
                    canSpin = false;
                    for (let t of matches) { t.classList.add('flipped'); sfx(600, 'sine', 0.1); await new Promise(r => setTimeout(r, 500)); }
                    if(mode === 'letter') players[curP].bank += (parseInt(wheelVal) || 0) * matches.length;
                    if(mode === 'vowel') players[curP].bank -= 250;
                    updateUI(); canSpin = true;
                } else {
                    if(mode === 'vowel') players[curP].bank -= 250;
                    nextTurn("NON C'È!");
                }
            }
        }

        function nextTurn(txt) {
            msg(txt);
            setTimeout(() => {
                curP = (curP + 1) % players.length;
                updateUI(); canSpin = true;
                msg(`TOCCA A ${players[curP].name}`);
            }, 2000);
        }

        function newRound() {
            phrase = DATABASE[Math.floor(Math.random()*DATABASE.length)];
            document.getElementById('cat-display').innerText = phrase.c;
            renderBoard(); updateUI(); canSpin = true;
        }

        function renderBoard() {
            const board = document.getElementById('board'); board.innerHTML = '';
            const words = phrase.f.split(' ');
            let currentRow = document.createElement('div'); currentRow.className = 'row';
            let charCount = 0; const MAX_PER_ROW = 14;
            words.forEach((word, index) => {
                if (charCount + word.length > MAX_PER_ROW && charCount > 0) {
                    board.appendChild(currentRow);
                    currentRow = document.createElement('div'); currentRow.className = 'row';
                    charCount = 0;
                }
                word.split('').forEach(char => {
                    const t = document.createElement('div'); t.className = 'tile'; t.dataset.char = char;
                    t.innerHTML = `<div class="tile-in"><div class="face face-front active"></div><div class="face face-back">${char}</div></div>`;
                    currentRow.appendChild(t); charCount++;
                });
                if (index < words.length - 1 && charCount < MAX_PER_ROW) {
                    const space = document.createElement('div'); space.className = 'tile'; space.style.visibility = 'hidden';
                    currentRow.appendChild(space); charCount++;
                }
            });
            board.appendChild(currentRow);
        }

        async function revealAllSequential() {
            for(let t of document.querySelectorAll('.tile:not(.flipped)')) {
                if(t.dataset.char) { t.classList.add('flipped'); await new Promise(r => setTimeout(r, 100)); }
            }
        }

        function updateUI() {
            const h = document.getElementById('hud-top'); h.innerHTML = '';
            players.forEach((p, i) => {
                h.innerHTML += `<div class="p-card ${i===curP?'active':''}">
                    <div style="font-size:0.7rem; color:#888;">${p.name}</div>
                    <div class="p-bank">€ ${p.bank}</div>
                </div>`;
            });
            if(document.getElementById('gm-panel').classList.contains('open')) updateMasterPlayerList();
        }

        function msg(t) {
            const m = document.getElementById('status-msg'); m.innerText = t;
            m.style.opacity = 1; setTimeout(() => m.style.opacity = 0, 2000);
        }

        function updateMasterPlayerList() {
            const container = document.getElementById('gm-players-list'); container.innerHTML = '';
            players.forEach((p, i) => {
                container.innerHTML += `<div class="gm-player-row">
                    <span style="font-size:0.7rem">${p.name}</span>
                    <div>
                        <button onclick="modifyBank(${i}, -500)" style="background:#444; border:none; padding:2px 5px; color:#fff">-</button>
                        <span style="color:var(--g); margin:0 5px">€${p.bank}</span>
                        <button onclick="modifyBank(${i}, 500)" style="background:#444; border:none; padding:2px 5px; color:#fff">+</button>
                    </div>
                </div>`;
            });
        }

        function modifyBank(idx, amt) {
            players[idx].bank = Math.max(0, players[idx].bank + amt);
            updateUI();
        }

        function updateWheelConfig() {
            SPOTS = document.getElementById('gm-wheel-data').value.split(',').map(s => s.trim().toUpperCase());
            drawWheel(); msg("AGGIORNATA!");
        }

        function forceNewRound() {
            const c = document.getElementById('gm-cat').value;
            const f = document.getElementById('gm-phrase').value;
            if(c && f) { 
                phrase = {f: f.toUpperCase().trim(), c: c.toUpperCase().trim()}; 
                renderBoard(); document.getElementById('cat-display').innerText = phrase.c;
                toggleRegia();
            }
        }
    </script>
</body>
</html>
